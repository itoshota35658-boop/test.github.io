<script>
fetch("https://ourdihzlrveuhvmusfmo.supabase.co/rest/v1/employees", {
  headers: {
    "apikey": "sb_publishable_cJLqavXaDOP2gEORI8E-kg_e5GWJ3SQ",
    "Authorization": "Bearer sb_publishable_cJLqavXaDOP2gEORI8E-kg_e5GWJ3SQ"
  }
})
.then(response => response.json())
.then(data => {
  let html = "";

  data.forEach(emp => {
    html += `
      <div style="
        background:#faf6ff;
        padding:15px;
        margin:10px 0;
        border-radius:12px;
        border:1px solid #ddd;
      ">
        <strong>${emp.name}</strong><br>
        部署：${emp.department}<br>
        給与：¥${emp.salary.toLocaleString()}
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
})
.catch(error => {
  console.error(error);
  document.getElementById("result").innerHTML =
    "データ取得に失敗しました";
});
</script>
