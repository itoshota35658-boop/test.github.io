<section>
  <h2>社員一覧（PostgreSQLから取得）</h2>
  <div id="result">
    読み込み中...
  </div>
</section>

<script>
fetch("http://localhost:3000/employees")
  .then(response => response.json())
  .then(data => {
    let html = "";

    data.forEach(emp => {
      html += `
        <div style="
          background:#faf6ff;
          padding:15px;
          margin:10px 0;
          border-radius:12px;
          border:1px solid #ddd;
        ">
          <strong>${emp.name}</strong><br>
          部署：${emp.department}<br>
          給与：¥${emp.salary.toLocaleString()}
        </div>
      `;
    });

    document.getElementById("result").innerHTML = html;
  })
  .catch(error => {
    document.getElementById("result").innerHTML =
      "データ取得に失敗しました";
    console.error(error);
  });
</script>
